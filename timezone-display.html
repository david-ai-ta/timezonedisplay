<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080C;
      --surface: #0C0E17;
      --surface-2: #10131E;
      --surface-3: #161A28;
      --border: rgba(255,255,255,0.055);
      --border-hover: rgba(255,255,255,0.11);
      --gold: #C8A46A;
      --gold-dim: rgba(200,164,106,0.1);
      --text-primary: #EDE8E0;
      --text-secondary: #78889A;
      --text-muted: #3C4658;
      --red: #D45A6A;
      --r-sm: 8px;
      --r-md: 14px;
      --r-lg: 20px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%, rgba(200,164,106,0.045) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 100%, rgba(74,120,200,0.04) 0%, transparent 55%),
        #07080C;
      color: var(--text-primary);
      min-height: 100vh;
    }

    .app {
      max-width: 1160px;
      margin: 0 auto;
      padding: 52px 24px 96px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 56px;
    }

    .header-label {
      font-size: 0.67rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0;
      animation: rise 0.7s 0.05s ease forwards;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.06em;
      line-height: 0.95;
      opacity: 0;
      animation: rise 0.7s 0.15s ease forwards;
    }

    .header-rule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
      opacity: 0;
      animation: rise 0.7s 0.25s ease forwards;
    }
    .header-rule-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .header-rule-line:last-child {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .header-rule-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.7;
    }

    /* ── Search ── */
    .search-wrap {
      max-width: 500px;
      margin: 0 auto 40px;
      opacity: 0;
      animation: rise 0.7s 0.35s ease forwards;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    .autocomplete-wrap {
      position: relative;
      flex: 1;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    .search-input:focus {
      border-color: rgba(200,164,106,0.38);
      background: var(--surface-3);
      box-shadow: 0 0 0 3px rgba(200,164,106,0.07);
    }
    .search-input::placeholder { color: var(--text-muted); }

    .btn-add {
      padding: 12px 24px;
      border-radius: var(--r-md);
      border: 1px solid rgba(200,164,106,0.28);
      background: var(--gold-dim);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-add:hover {
      background: rgba(200,164,106,0.18);
      border-color: rgba(200,164,106,0.5);
    }

    /* ── Dropdown ── */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface-2);
      border: 1px solid var(--border-hover);
      border-radius: var(--r-md);
      max-height: 230px;
      overflow-y: auto;
      z-index: 200;
      display: none;
      box-shadow: 0 20px 50px rgba(0,0,0,0.55);
    }
    .dropdown.open { display: block; animation: dropIn 0.15s ease; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.87rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.1s, color 0.1s;
    }
    .dropdown-item:hover, .dropdown-item.active {
      background: var(--surface-3);
      color: var(--text-primary);
    }
    .dropdown-item small { color: var(--text-muted); font-size: 0.74rem; flex-shrink: 0; }

    /* ── Team Panel ── */
    .team-section {
      max-width: 820px;
      margin: 0 auto 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      opacity: 0;
      animation: rise 0.7s 0.45s ease forwards;
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .team-header:hover { background: rgba(255,255,255,0.018); }

    .team-icon {
      width: 28px;
      height: 28px;
      background: var(--gold-dim);
      border: 1px solid rgba(200,164,106,0.2);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .team-header-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .team-count-badge {
      font-size: 0.68rem;
      background: var(--surface-3);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .team-toggle {
      margin-left: auto;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      transition: transform 0.3s ease;
    }
    .team-toggle.open { transform: rotate(180deg); }

    .team-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 20px;
    }
    .team-body.open { display: block; }

    .add-person-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .team-input, .team-select {
      flex: 1;
      min-width: 120px;
      padding: 9px 14px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .team-input:focus, .team-select:focus {
      border-color: rgba(200,164,106,0.35);
      background: var(--surface-3);
    }
    .team-input::placeholder { color: var(--text-muted); }
    .team-select { cursor: pointer; }
    .team-select option { background: #10131E; }

    .btn-sm {
      padding: 9px 18px;
      border-radius: var(--r-sm);
      border: 1px solid rgba(200,164,106,0.25);
      background: var(--gold-dim);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-sm:hover {
      background: rgba(200,164,106,0.18);
      border-color: rgba(200,164,106,0.42);
    }

    .people-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .person-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .person-row:hover { border-color: var(--border-hover); }

    .person-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.66rem;
      font-weight: 700;
      color: rgba(0,0,0,0.8);
      flex-shrink: 0;
    }

    .person-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 80px;
    }

    .person-city-select {
      flex: 1;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-3);
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }
    .person-city-select:focus { border-color: rgba(200,164,106,0.35); }
    .person-city-select.unassigned { color: #D4813A; border-color: rgba(212,129,58,0.3); }

    .btn-remove-person {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .btn-remove-person:hover { color: var(--red); }

    .people-empty {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
      padding: 14px 0 6px;
      font-style: italic;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(256px, 1fr));
      gap: 18px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
      animation: cardIn 0.5s ease both;
    }
    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 14px 44px rgba(0,0,0,0.45);
      transform: translateY(-2px);
    }

    /* Top phase accent bar */
    .card-bar {
      height: 2px;
      flex-shrink: 0;
      transition: background 1s ease;
    }
    .card--dawn  .card-bar { background: linear-gradient(90deg, transparent, #F5C28A 50%, transparent); }
    .card--day   .card-bar { background: linear-gradient(90deg, transparent, #9BC8E8 50%, transparent); }
    .card--dusk  .card-bar { background: linear-gradient(90deg, transparent, #E89060 50%, transparent); }
    .card--night .card-bar { background: linear-gradient(90deg, transparent, #7080CC 50%, transparent); }

    .card-inner {
      padding: 20px 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .card-city {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.1;
      letter-spacing: 0.015em;
    }

    .card-region {
      font-size: 0.63rem;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .card-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 0 2px 8px;
      transition: color 0.15s;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .card-remove:hover { color: var(--red); }

    .card-time {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2rem, 3.2vw, 2.5rem);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .card-time-sec {
      font-size: 0.52em;
      opacity: 0.38;
    }

    .card-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-date {
      font-size: 0.7rem;
      color: var(--text-secondary);
      letter-spacing: 0.03em;
    }

    .card-offset {
      font-size: 0.62rem;
      color: var(--text-muted);
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
    }

    .card-people {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-person {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-person-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.57rem;
      font-weight: 700;
      color: rgba(0,0,0,0.8);
      flex-shrink: 0;
    }

    .card-person-name {
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    /* ── Empty state ── */
    .empty-hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 72px;
      font-style: italic;
    }

    /* ── Animations ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>

<div class="app">

  <!-- Header -->
  <header class="header">
    <p class="header-label">Global Time Zones</p>
    <h1 class="header-title">World Clock</h1>
    <div class="header-rule">
      <div class="header-rule-line"></div>
      <div class="header-rule-dot"></div>
      <div class="header-rule-line"></div>
    </div>
  </header>

  <!-- Search -->

    <div class="search-row">
      <div class="autocomplete-wrap">

            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input type="text" class="search-input" id="cityInput" placeholder="Search city or timezone…" autocomplete="off" />
        <div class="dropdown" id="dropdown"></div>
      </div>
      <button class="btn-add" onclick="addSelectedCity()">Add</button>
    </div>
  </div>

  <!-- Team panel -->

        </svg>
      </div>
      <span class="team-header-title">Team</span>
      <span class="team-count-badge" id="teamCountBadge">0 people</span>
      <span class="team-toggle" id="teamToggle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </span>
    </div>
    <div class="team-body" id="teamBody">
      <div class="add-person-bar">
        <input type="text" class="team-input" id="personNameInput" placeholder="Name" maxlength="40" />
        <select class="team-select" id="personCitySelect">
          <option value="">— assign to city —</option>
        </select>
        <button class="btn-sm" onclick="addPerson()">Add</button>
      </div>
      <div class="people-list" id="peopleList">
        <p class="people-empty">No team members yet. Add someone above.</p>
      </div>
    </div>
  </div>

  <!-- Clocks -->
  <div class="grid" id="grid"></div>
  <p class="empty-hint" id="emptyHint">Search and add cities above to get started.</p>

</div>

  ["Singapore","Asia/Singapore","Singapore"],
  ["Sofia","Europe/Sofia","Bulgaria"],
  ["Stockholm","Europe/Stockholm","Sweden"],
  ["Sydney","Australia/Sydney","Australia"],
  ["Taipei","Asia/Taipei","Taiwan"],
  ["Tashkent","Asia/Tashkent","Uzbekistan"],
  ["Tehran","Asia/Tehran","Iran"],
  ["Tel Aviv","Asia/Jerusalem","Israel"],
  ["Tokyo","Asia/Tokyo","Japan"],
  ["Toronto","America/Toronto","Canada"],
  ["Vancouver","America/Vancouver","Canada"],
  ["Vienna","Europe/Vienna","Austria"],
  ["Warsaw","Europe/Warsaw","Poland"],
  ["Washington DC","America/New_York","USA"],
  ["Winnipeg","America/Winnipeg","Canada"],
  ["Yangon","Asia/Rangoon","Myanmar"],
  ["Zurich","Europe/Zurich","Switzerland"],
];

// ── State ─────────────────────────────────────────────────────────────────
const STORAGE_CITIES    = "worldclock_cities";
const STORAGE_PEOPLE    = "worldclock_people";
const STORAGE_TEAM_OPEN = "worldclock_team_open";

let selected = [];
let people   = [];

let activeDropdownIndex = -1;
let filteredCities = [];
let pendingCity = null;

// ── Persistence ───────────────────────────────────────────────────────────
function cityKey(c) { return c.city + "|" + c.tz; }

function loadSaved() {
  try {
    const rc = localStorage.getItem(STORAGE_CITIES);
    if (rc) selected = JSON.parse(rc);
  } catch { selected = []; }

  if (!selected.length) {
    selected = [
      { city: "New York",  tz: "America/New_York",  region: "USA" },
      { city: "London",    tz: "Europe/London",      region: "UK" },
      { city: "Dubai",     tz: "Asia/Dubai",         region: "UAE" },
      { city: "Singapore", tz: "Asia/Singapore",     region: "Singapore" },
      { city: "Tokyo",     tz: "Asia/Tokyo",         region: "Japan" },
    ];
  }

  try {
    const rp = localStorage.getItem(STORAGE_PEOPLE);
    if (rp) people = JSON.parse(rp);
  } catch { people = []; }
}

function saveCities() { localStorage.setItem(STORAGE_CITIES, JSON.stringify(selected)); }
function savePeople() { localStorage.setItem(STORAGE_PEOPLE, JSON.stringify(people)); }

// ── Avatar helpers ────────────────────────────────────────────────────────
const AVATAR_COLORS = [
  "#C8845A","#5A8EC8","#5AC878","#C85A7A","#9A5AC8",
  "#C8B45A","#5AC8C0","#C86060","#60A8C8","#8878D0",
];

function nameToColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function initials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function avatarHTML(name, size) {
  const color = nameToColor(name);
  const ini   = initials(name);
  return `<div class="${size === 'sm' ? 'card-person-avatar' : 'person-avatar'}" style="background:${color}">${ini}</div>`;
}

// ── Day/night phase ───────────────────────────────────────────────────────
function getDayPhase(tz) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', hour12: false
  }).formatToParts(new Date());
  const h = parseInt(parts.find(p => p.type === 'hour').value, 10);
  if (h >= 5  && h < 9)  return 'dawn';
  if (h >= 9  && h < 18) return 'day';
  if (h >= 18 && h < 21) return 'dusk';
  return 'night';
}

// ── Team panel ────────────────────────────────────────────────────────────
function toggleTeam() {
  const body   = document.getElementById("teamBody");
  const toggle = document.getElementById("teamToggle");
  const isOpen = body.classList.toggle("open");
  toggle.classList.toggle("open", isOpen);
  localStorage.setItem(STORAGE_TEAM_OPEN, isOpen ? "1" : "0");
}

function restoreTeamState() {
  const open = localStorage.getItem(STORAGE_TEAM_OPEN) !== "0";
  if (open) {
    document.getElementById("teamBody").classList.add("open");
    document.getElementById("teamToggle").classList.add("open");
  }
}

function renderTeamPanel() {
  const badge = document.getElementById("teamCountBadge");
  badge.textContent = `${people.length} ${people.length === 1 ? "person" : "people"}`;

  const sel  = document.getElementById("personCitySelect");
  const prev = sel.value;
  sel.innerHTML = `<option value="">— assign to city —</option>`;
  selected.forEach(c => {
    const k = cityKey(c);
    const opt = document.createElement("option");
    opt.value = k;
    opt.textContent = `${c.city} (${c.region})`;
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;

  const list = document.getElementById("peopleList");
  list.innerHTML = "";

  if (!people.length) {
    list.innerHTML = `<p class="people-empty">No team members yet. Add someone above.</p>`;
    return;
  }

  people.forEach((p, idx) => {
    const cityExists = p.cityKey && selected.some(c => cityKey(c) === p.cityKey);
    const row = document.createElement("div");
    row.className = "person-row";

    let cityOptions = `<option value="">— Unassigned —</option>`;
    selected.forEach(c => {
      const k = cityKey(c);
      cityOptions += `<option value="${k}" ${p.cityKey === k ? "selected" : ""}>${c.city} (${c.region})</option>`;
    });

    row.innerHTML = `
      ${avatarHTML(p.name, 'lg')}
      <span class="person-name">${escHtml(p.name)}</span>
      <select class="person-city-select ${!cityExists ? 'unassigned' : ''}"
              onchange="reassignPerson(${idx}, this.value)">
        ${cityOptions}
      </select>
      <button class="btn-remove-person" title="Remove" onclick="removePerson(${idx})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    `;
    list.appendChild(row);
  });
}

function addPerson() {
  const nameEl = document.getElementById("personNameInput");
  const cityEl = document.getElementById("personCitySelect");
  const name = nameEl.value.trim();
  if (!name) { flashEl(nameEl); return; }

  people.push({ id: Date.now(), name, cityKey: cityEl.value });
  savePeople();
  nameEl.value = "";
  cityEl.value = "";
  renderTeamPanel();
  renderGrid();
}

function removePerson(idx) {
  people.splice(idx, 1);
  savePeople();
  renderTeamPanel();
  renderGrid();
}

function reassignPerson(idx, newCityKey) {
  people[idx].cityKey = newCityKey;
  savePeople();
  const selects = document.querySelectorAll(".person-city-select");
  if (selects[idx]) selects[idx].className = "person-city-select" + (newCityKey ? "" : " unassigned");
  renderGrid();
}

// ── Clock grid ────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById("grid");
  const hint = document.getElementById("emptyHint");
  grid.innerHTML = "";
  hint.style.display = selected.length ? "none" : "block";

  selected.forEach((item, i) => {
    const key = cityKey(item);
    const assignedPeople = people.filter(p => p.cityKey === key);

    let peopleHTML = "";
    if (assignedPeople.length) {
      const chips = assignedPeople.map(p =>
        `<div class="card-person">
          ${avatarHTML(p.name, 'sm')}
          <span class="card-person-name">${escHtml(p.name)}</span>
        </div>`
      ).join("");
      peopleHTML = `<div class="card-people">${chips}</div>`;
    }

    const phase = getDayPhase(item.tz);
    const card  = document.createElement("div");
    card.className = `card card--${phase}`;
    card.id = `card-${i}`;
    card.style.animationDelay = `${i * 0.07}s`;
    card.innerHTML = `
      <div class="card-bar"></div>
      <div class="card-inner">
        <div class="card-header">
          <div>
            <div class="card-city">${escHtml(item.city)}</div>
            <div class="card-region">${escHtml(item.region)}</div>
          </div>
          <button class="card-remove" title="Remove city" onclick="removeCity(${i})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="card-time" id="time-${i}">--:--</div>
        <div class="card-meta">
          <span class="card-date" id="date-${i}"></span>
          <span class="card-offset" id="offset-${i}"></span>
        </div>
        ${peopleHTML}
      </div>
    `;
    grid.appendChild(card);
  });

  updateClocks();
}

function updateClocks() {
  const now = new Date();
  selected.forEach((item, i) => {
    const timeFmt = new Intl.DateTimeFormat("en-GB", {
      timeZone: item.tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
    });
    const dateFmt = new Intl.DateTimeFormat("en-GB", {
      timeZone: item.tz, weekday: "short", day: "numeric", month: "short", year: "numeric",
    });
    const offsetFmt = new Intl.DateTimeFormat("en-GB", {
      timeZone: item.tz, timeZoneName: "shortOffset",
    });

    const tel = document.getElementById(`time-${i}`);
    const del = document.getElementById(`date-${i}`);
    const oel = document.getElementById(`offset-${i}`);
    if (!tel) return;

    const timeStr = timeFmt.format(now);
    const lastColon = timeStr.lastIndexOf(':');
    tel.innerHTML = timeStr.substring(0, lastColon) + `<span class="card-time-sec">:${timeStr.substring(lastColon + 1)}</span>`;

    del.textContent = dateFmt.format(now);
    const parts  = offsetFmt.formatToParts(now);
    const offPart = parts.find(p => p.type === "timeZoneName");
    oel.textContent = offPart ? offPart.value : "";

    // Update phase class without resetting entrance animation
    const card = document.getElementById(`card-${i}`);
    if (card) {
      const newPhase = getDayPhase(item.tz);
      ['dawn','day','dusk','night'].forEach(p => card.classList.remove(`card--${p}`));
      card.classList.add(`card--${newPhase}`);
    }
  });
}

// ── Add / Remove cities ───────────────────────────────────────────────────
function addSelectedCity() {
  let toAdd = pendingCity;

  if (!toAdd) {
    const val = document.getElementById("cityInput").value.trim().toLowerCase();
    if (!val) return;
    toAdd = CITIES.find(([c]) => c.toLowerCase() === val);
    if (!toAdd) {
      const match = CITIES.find(([c, tz, r]) =>
        c.toLowerCase().includes(val) || tz.toLowerCase().includes(val) || r.toLowerCase().includes(val)
      );
      if (!match) { flashEl(document.getElementById("cityInput")); return; }
      toAdd = match;
    }
  }

  const [city, tz, region] = toAdd;
  if (!selected.some(s => s.city === city && s.tz === tz)) {
    selected.push({ city, tz, region });
    saveCities();
    renderGrid();
    renderTeamPanel();
  }
  clearCityInput();
}

function removeCity(i) {
  const key = cityKey(selected[i]);
  people.forEach(p => { if (p.cityKey === key) p.cityKey = ""; });
  savePeople();
  selected.splice(i, 1);
  saveCities();
  renderGrid();
  renderTeamPanel();
}

// ── Utilities ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function flashEl(el) {
  el.style.borderColor = "#D45A6A";
  setTimeout(() => el.style.borderColor = "", 700);
}

function clearCityInput() {
  document.getElementById("cityInput").value = "";
  pendingCity = null;
  closeDropdown();
}

// ── Autocomplete ──────────────────────────────────────────────────────────
function openDropdown(items) {
  const dd = document.getElementById("dropdown");
  dd.innerHTML = "";
  activeDropdownIndex = -1;
  filteredCities = items;

  items.slice(0, 60).forEach(([city, tz, region]) => {
    const div = document.createElement("div");
    div.className = "dropdown-item";
    div.innerHTML = `${escHtml(city)} <small>${escHtml(region)}</small>`;
    div.onmousedown = (e) => {
      e.preventDefault();
      pendingCity = [city, tz, region];
      document.getElementById("cityInput").value = city;
      closeDropdown();
    };
    dd.appendChild(div);
  });

  dd.classList.toggle("open", items.length > 0);
}

function closeDropdown() {
  document.getElementById("dropdown").classList.remove("open");
  activeDropdownIndex = -1;
}

function highlightDropdownItem(idx) {
  const items = document.querySelectorAll(".dropdown-item");
  items.forEach((el, i) => el.classList.toggle("active", i === idx));
  if (items[idx]) items[idx].scrollIntoView({ block: "nearest" });
}

document.getElementById("cityInput").addEventListener("input", function () {
  pendingCity = null;
  const q = this.value.trim().toLowerCase();
  if (!q) { closeDropdown(); return; }
  const matches = CITIES.filter(([c, tz, r]) =>
    c.toLowerCase().includes(q) || tz.toLowerCase().includes(q) || r.toLowerCase().includes(q)
  );
  openDropdown(matches);
});

document.getElementById("cityInput").addEventListener("keydown", function (e) {
  const items = document.querySelectorAll(".dropdown-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeDropdownIndex = Math.min(activeDropdownIndex + 1, items.length - 1);
    highlightDropdownItem(activeDropdownIndex);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeDropdownIndex = Math.max(activeDropdownIndex - 1, 0);
    highlightDropdownItem(activeDropdownIndex);
  } else if (e.key === "Enter") {
    if (activeDropdownIndex >= 0 && filteredCities[activeDropdownIndex]) {
      const [city, tz, region] = filteredCities[activeDropdownIndex];
      pendingCity = [city, tz, region];
      document.getElementById("cityInput").value = city;
      closeDropdown();
    } else {
      addSelectedCity();
    }
  } else if (e.key === "Escape") {
    closeDropdown();
  }
});

document.getElementById("personNameInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") addPerson();
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".autocomplete-wrap")) closeDropdown();
});

// ── Boot ──────────────────────────────────────────────────────────────────
loadSaved();
restoreTeamState();
renderTeamPanel();
renderGrid();
setInterval(updateClocks, 1000);
</script>
</body>
</html>
